kind = "web"
previewPath = "/"
title = "Trova Parcheggi"
version = "1.0.0"
id = "artifacts/parcheggi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24944

[services.development]
run = "pnpm --filter @workspace/parcheggi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parcheggi", "run", "build" ]
publicDir = "artifacts/parcheggi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24944"
BASE_PATH = "/"
